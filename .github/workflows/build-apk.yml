name: Build APK (EAS)

on:
  workflow_dispatch:          # trigger manually from GitHub Actions tab
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'src/**'
      - 'assets/**'
      - 'app.json'
      - 'package.json'
      - 'eas.json'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive

      - name: Get APK download URL
        run: |
          echo "✅ Build submitted to EAS."
          echo "Download the APK at: https://expo.dev/accounts/[YOUR_ACCOUNT]/projects/mindguide/builds"
